    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-container {
            padding: 150px 5%;
            text-align: center;
            min-height: 100vh;
            max-width: 800px;
            margin: 0 auto;
        }
        .profile-box {
            display: inline-block;
            margin-bottom: 30px;
        }
        .profile-box img {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            border: 4px solid var(--bg-color);
            margin-bottom: 15px;
        }
        .profile-box h1 {
            font-size: 2.5rem;
            color: var(--blue-dark);
            margin: 0;
            font-family: sans-serif;
        }
        .profile-intro {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 40px;
            text-align: left;
        }
        .profile-data-title {
            font-family: sans-serif;
            font-style: normal;
            font-weight: bold;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-data {
            display: flex;
            flex-direction: column;
            border-top: 2px solid #ddd;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
        .data-label {
            font-weight: bold;
            width: 30%;
            color: #555;
        }
        .data-value {
            width: 70%;
        }

</head>
