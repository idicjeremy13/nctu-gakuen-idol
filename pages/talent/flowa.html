<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國立陽明交通大學學園偶像社 - Flowa</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-container {
            padding: 150px 5%;
            text-align: center;
            min-height: 100vh;
            max-width: 800px;
            margin: 0 auto;
        }
        .profile-box {
            background-color: #fff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
        }
        .profile-box img {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            border: 4px solid var(--bg-color, #f0f4f8);
            margin-bottom: 20px;
        }
        .profile-box h1 {
            font-size: 2.5rem;
            color: var(--blue-dark, #2c3e50);
            margin-bottom: 20px;
        }
        .profile-intro {
            text-align: left;
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 50px;
            text-indent: 2em;
        }
        .profile-intro p {
            margin-bottom: 1em;
        }
        .data-title {
            text-align: center;
            font-style: normal;
            font-family: sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: var(--blue-dark, #2c3e50);
        }
        .data-table {
            border-top: 2px solid #ddd;
            border-bottom: 2px solid #ddd;
            text-align: left;
        }
        .data-row {
            display: flex;
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        .data-row:last-child {
            border-bottom: none;
        }
        .data-label {
            flex: 0 0 100px;
            font-weight: bold;
            color: #666;
            text-align: center;
        }
        .data-value {
            flex: 1;
            padding-left: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="logo">
            <a href="/">NYCU 學園偶像社</a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="../about.html">ABOUT</a></li>
                <li><a href="../talent.html">TALENT</a></li>
                <li><a href="https://www.youtube.com/shorts/sRKBkiL_kjs" target="_blank">SPECIAL</a></li>
            </ul>
        </nav>
        <div class="social-nav">
            <a href="#" target="_blank"><i class="fab fa-x-twitter"></i></a>
        </div>
        <button class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="profile-container">
        <div class="profile-box">
            <img src="../../images/flowa.jpg" alt="Flowa">
            <h1>Flowa</h1>
        </div>
        
        <div class="profile-intro">
            <p>是今年入學的可愛系偶像學妹，喜歡甜甜圈到會隨時將甜甜圈掛在手臂上。因為 VTuber 才知道偶像世界，故亦立志成為 VTuber 後開演唱會。</p>
            <p>閒暇時會在紙上畫畫，也會將畫好的服裝手作出來，成員的表演服都是由他操刀而成，是重要的主視覺設計擔當。</p>
        </div>

        <div class="profile-data-section">
            <h2 class="data-title">DATA</h2>
            <div class="data-table">
                <div class="data-row">
                    <div class="data-label">身高</div>
                    <div class="data-value">二十個甜甜圈</div>
                </div>
                <div class="data-row">
                    <div class="data-label">出道日</div>
                    <div class="data-value">2025.10.26</div>
                </div>
                <div class="data-row">
                    <div class="data-label">組合</div>
                    <div class="data-value">2期生<br>虛擬偶像部</div>
                </div>
                <div class="data-row">
                    <div class="data-label">興趣</div>
                    <div class="data-value">設計偶像系服裝</div>
                </div>
            </div>
        </div>
    
        </div>
    <div style="text-align: right; margin-top: 50px; margin-bottom: 50px; padding-right: 5%;"><a href="../talent.html" class="more-link"><span class="arrow-line" style="transform: rotate(180deg); margin-left: 0; margin-right: 15px;"></span>BACK</a></div>
    <script src="../../script.js"></script>
    <footer class="site-footer">
        <div class="footer-left">NCTU Gakuen Idol Club &copy; 2026</div>
        <div class="footer-right">TO THE TOP!!!!!!</div>
    </footer>
</body>
</html>
